# agentscope-dataagent — single-node one-click deployment.
#
#   1. (optional) cp .env.example .env  &&  set DASHSCOPE_API_KEY
#   2. docker compose up -d --build
#   3. open http://localhost:8080  (demo logins: bob/bob, alice/alice; admin: admin/admin)
#
# Docker socket: each per-user workspace runs in a Docker *sandbox* container
# that DataAgent launches via the `docker` CLI, so this compose bind-mounts the
# host /var/run/docker.sock (Docker-out-of-Docker). The container therefore runs
# as root for socket access. Mounting the socket grants host-root-equivalent
# privileges — only run this on a host you trust. The sandbox image is
# `ubuntu:22.04`; the host daemon pulls it on first use (needs network).
#
# Persistence: the embedded H2 catalog (accounts, agents, contributions) and the
# auto-generated agentscope.json + shared marketplace content live in the
# `dataagent-data` volume and survive restarts. Per-user *live workspace* state
# (sessions, scratch files) lives inside the ephemeral sandbox containers and is
# NOT persisted across sandbox idle-eviction / restart in this single-node setup
# (that needs a real snapshotSpec + distributed backend — see docs/cluster-deploy.md).
#
# For a clustered MySQL + Redis + multi-replica deployment, see
# docs/cluster-deploy.md — it reuses the `agentscope/dataagent:latest` image
# this file builds.
name: agentscope-dataagent

services:
  dataagent:
    build:
      # Context is the repo root (agentscope-java): this module depends on
      # sibling reactor modules that are not published to a remote Maven repo.
      context: ../../..
      dockerfile: agentscope-examples/agents/agentscope-dataagent/Dockerfile
    image: agentscope/dataagent:latest
    container_name: agentscope-dataagent
    restart: unless-stopped
    # Root so the process can talk to the bind-mounted Docker socket below.
    # (Mounting the socket is already host-root-equivalent; see header note.)
    user: "0:0"
    ports:
      - "${DATAAGENT_PORT:-8080}:8080"
    environment:
      # Enables chat. Without it the UI still boots; chat fails until set.
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DATAAGENT_MODEL_NAME: ${DATAAGENT_MODEL_NAME:-qwen-max}
      # Dev placeholder by default — override for any non-local deployment.
      DATAAGENT_JWT_SECRET: ${DATAAGENT_JWT_SECRET:-dataagent-default-dev-secret-change-in-production-32chars}
      # Pins the runtime cwd onto the volume (channel/identity state under /data/.agentscope).
      DATAAGENT_WORKSPACE: /data
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - dataagent-data:/data
      # Docker-out-of-Docker: lets DataAgent launch per-user sandbox containers
      # on the host daemon. Required for the chat/workspace path to work.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

volumes:
  dataagent-data:
